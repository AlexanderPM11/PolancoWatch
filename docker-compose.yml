version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polancowatch-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/polancowatch.db
    volumes:
      - polancowatch_data:/app/data
    ports:
      - "80:80"
    restart: always

  web:
    build:
      context: ./PolancoWatch.Web
      dockerfile: Dockerfile
    container_name: polancowatch-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

volumes:
  polancowatch_data:
