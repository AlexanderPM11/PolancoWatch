version: '3.8'

services:
  polancowatch-api:
    build: 
      context: . 
      dockerfile: Dockerfile
    container_name: polancowatch_backend_core
    # ports:
    #   - "80:80" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - APP_URL=${APP_URL:-http://localhost:5173}
    
    # --- DOKPLOY METRICS MAGIC ---
    # This allows the container to see all processes on the real host (VPS)
    pid: "host"       
    
    # This provides access to advanced hardware metrics without Docker blocking it
    privileged: true  
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - polancowatch_db_data:/app/data
    
    restart: unless-stopped

volumes:
  polancowatch_db_data:
