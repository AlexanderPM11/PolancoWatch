version: '3.8'

services:
  polancowatch-api:
    build: 
      context: . 
      dockerfile: Dockerfile
    container_name: polancowatch_backend_core
    # ports:
    #   - "80:80" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    
    # --- DOKPLOY METRICS MAGIC ---
    # This allows the container to see all processes on the real host (VPS)
    pid: "host"       
    
    # This provides access to advanced hardware metrics without Docker blocking it
    privileged: true  
    
    restart: unless-stopped
